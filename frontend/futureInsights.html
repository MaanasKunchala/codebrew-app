<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Insights</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body
  style="
    background-image: url('resources/sunsetPic.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    
  "
>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo"><img
            src="resources/Star Chart.png"
            alt="The Dreamers' Star Chart"
            style="height: 48px; width: auto;"
            ></a>
    <div class="navbar-links">
      <a href="index.html#home">Home</a>
      <a href="index.html#seasons">Seasons</a>
      <a href="index.html#insights">Insights</a>
    </div>
  </nav>
  <main class="screen center">
    <section class="card form-card">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <h1>Future Insights</h1>
      <p class="subtext">
        Retrieve the latest recorded community report and latest ML-based forecast for a selected region.
      </p>

      <form id="futureInsightsForm" class="form-grid">
        <label>
          Region
          <select name="region_name" id="future_region_name" required>
            <option value="">Loading regions...</option>
          </select>
        </label>

        <button type="submit" class="primary-btn">View Latest Insight</button>
      </form>

      <p id="futureInsightsMessage" class="subtext" style="margin-top: 16px;"></p>
    </section>
  </main>

  <script src="js/futureInsights.js"></script>
</body>

</html>
