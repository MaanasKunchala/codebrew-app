<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Input</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Temperature Input</h1>
        <div class="input-group">
            <label for="temperature">Enter Current Temperature:</label>
            <input type="number" id="temperature" placeholder="e.g., 72" step="0.1">
        </div>
        <button onclick="submitTemperature()">Submit</button>
        <div id="result"></div>
    </div>

    <script>
        function submitTemperature() {
            const temp = document.getElementById('temperature').value;
            const resultDiv = document.getElementById('result');
            
            if (temp === '') {
                resultDiv.textContent = 'Please enter a temperature.';
                resultDiv.style.color = 'red';
            } else {
                resultDiv.textContent = `Temperature recorded: ${temp}°F`;
                resultDiv.style.color = 'green';
            }
        }
    </script>
</body>
</html>
