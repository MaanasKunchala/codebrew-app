<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Input</title>
</head>
<body>
    <div class="container">
        <h1>🌡️ Temperature Input</h1>
        <div class="input-group">
            <label for="temperature">Enter Current Temperature:</label>
            <input type="number" id="temperature" placeholder="e.g., 72" step="0.1">
        </div>
        <button onclick="submitTemperature()">Submit</button>
        <div id="result"></div>
    </div>

    <script>
        function submitTemperature() {
            const temp = document.getElementById('temperature').value;
            const resultDiv = document.getElementById('result');
            
            if (temp === '') {
                resultDiv.textContent = 'Please enter a temperature.';
                resultDiv.style.color = 'red';
            } else {
                resultDiv.textContent = `Temperature recorded: ${temp}°F`;
                resultDiv.style.color = 'green';
            }
        }
    </script>
</body>
</html>
