<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Report</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <h1>Dog Report</h1>
        <form id="dogForm">
            <div class="form-group">
                <label for="dogCount">Number of Dogs:</label>
                <input type="number" id="dogCount" name="dogCount" min="0" required>
            </div>
            <button type="submit">Submit Report</button>
        </form>
        <div class="result" id="result"></div>
    </div>

    <script>
        document.getElementById('dogForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const count = document.getElementById('dogCount').value;
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = `Report submitted: ${count} dog(s) recorded.`;
            resultDiv.style.display = 'block';
        });
    </script>
</body>
</html>
